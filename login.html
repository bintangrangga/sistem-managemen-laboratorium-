<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Login - Activity Manager</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- CSS eksternal -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="login-page">
    <div class="card login-card shadow">
      <div class="login-logo">
        <i class="bi bi-arrow-repeat"></i>
      </div>

      <h4 class="text-center fw-bold">Welcome Back</h4>
      <p class="text-center text-muted mb-4">
        Login untuk mengatur aktivitasmu
      </p>

      <form id="loginForm">
        <div class="mb-3 position-relative">
          <i class="bi bi-person login-icon"></i>
          <input
            id="username"
            class="form-control login-input"
            placeholder="Username"
            required
          />
        </div>

        <div class="mb-4 position-relative">
          <i class="bi bi-lock login-icon"></i>
          <input
            id="password"
            type="password"
            class="form-control login-input"
            placeholder="Password"
            required
          />
        </div>

        <button class="btn btn-login w-100 text-white">LOGIN</button>
      </form>

      <p class="text-center mt-3 small text-muted">
        Belum punya akun? <span class="text-primary">Daftar</span>
      </p>
    </div>

    <script>
      document.getElementById("loginForm").addEventListener("submit", (e) => {
        e.preventDefault();

        const user = username.value;
        const pass = password.value;

        if (user === "admin" && pass === "admin123") {
          localStorage.setItem("isLogin", "true");
          window.location.href = "dashboard.html";
        } else {
          alert("Username atau password salah");
        }
      });
    </script>
  </body>
</html>
