<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Detail Kegiatan</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container-fluid">
      <div class="row">
        <!-- SIDEBAR (TIDAK DIUBAH) -->
        <div class="col-2 sidebar vh-100 p-3 d-flex flex-column">
          <h5 class="mb-4 fw-bold text-white">ASLAB</h5>

          <nav class="nav flex-column gap-2 flex-grow-1">
            <a class="nav-link" href="dashboard.html">Dashboard</a>
            <a class="nav-link active" href="kegiatan.html"
              >Manajemen Kegiatan</a
            >
            <a class="nav-link" href="#">Laporan Inventaris</a>
          </nav>

          <hr class="text-white opacity-50" />
          <a class="nav-link text-danger fw-semibold" href="login.html"
            >Logout</a
          >
        </div>

        <!-- KONTEN -->
        <div class="col-10 p-0">
          <nav class="navbar bg-white border-bottom px-4">
            <span class="navbar-brand fw-semibold" id="judulKegiatan"
              >Detail Kegiatan</span
            >
            <span>Admin</span>
          </nav>

          <div class="p-4">
            <!-- TAB -->
            <ul class="nav nav-tabs mb-4">
              <li class="nav-item">
                <button
                  class="nav-link active"
                  data-bs-toggle="tab"
                  data-bs-target="#tim"
                >
                  Tim
                </button>
              </li>
              <li class="nav-item">
                <button
                  class="nav-link"
                  data-bs-toggle="tab"
                  data-bs-target="#absensi"
                >
                  Absensi
                </button>
              </li>
              <li class="nav-item">
                <button
                  class="nav-link"
                  data-bs-toggle="tab"
                  data-bs-target="#arsip"
                >
                  Arsip
                </button>
              </li>
              <li class="nav-item">
                <button
                  class="nav-link"
                  data-bs-toggle="tab"
                  data-bs-target="#poster"
                >
                  Poster
                </button>
              </li>
            </ul>

            <div class="tab-content">
              <!-- ================= TIM ================= -->
              <div class="tab-pane fade show active" id="tim">
                <div class="card shadow-sm">
                  <div class="card-body">
                    <form id="formTim" class="row g-2 mb-3">
                      <div class="col-md-4">
                        <input
                          id="namaTim"
                          class="form-control"
                          placeholder="Nama Panitia"
                          required
                        />
                      </div>
                      <div class="col-md-4">
                        <input
                          id="jabatanTim"
                          class="form-control"
                          placeholder="Jabatan"
                          required
                        />
                      </div>
                      <div class="col-md-2">
                        <button class="btn btn-success w-100">Tambah</button>
                      </div>
                    </form>

                    <table class="table table-bordered">
                      <thead>
                        <tr>
                          <th>Nama</th>
                          <th>Jabatan</th>
                        </tr>
                      </thead>
                      <tbody id="tabelTim"></tbody>
                    </table>
                  </div>
                </div>
              </div>

              <!-- ================= ABSENSI ================= -->
              <div class="tab-pane fade" id="absensi">
                <div class="card shadow-sm">
                  <div class="card-body">
                    <form id="formAbsensi" class="row g-2 mb-3">
                      <div class="col-md-3">
                        <input
                          id="namaPeserta"
                          class="form-control"
                          placeholder="Nama Peserta"
                          required
                        />
                      </div>
                      <div class="col-md-3">
                        <input
                          id="nimPeserta"
                          class="form-control"
                          placeholder="NIM"
                          required
                        />
                      </div>
                      <div class="col-md-2">
                        <button class="btn btn-success w-100">Tambah</button>
                      </div>
                      <div class="col-md-4">
                        <button
                          type="button"
                          id="downloadExcel"
                          class="btn btn-outline-primary w-100"
                        >
                          Download Excel
                        </button>
                      </div>
                    </form>

                    <!-- QR INPUT -->
                    <input
                      id="qrInput"
                      class="form-control mb-3"
                      placeholder="Scan QR di sini (Nama|NIM)"
                    />

                    <table class="table table-bordered">
                      <thead>
                        <tr>
                          <th>Nama</th>
                          <th>NIM</th>
                          <th>Status</th>
                        </tr>
                      </thead>
                      <tbody id="tabelAbsensi"></tbody>
                    </table>
                  </div>
                </div>
              </div>

              <!-- ================= ARSIP ================= -->
              <div class="tab-pane fade" id="arsip">
                <div class="card shadow-sm">
                  <div class="card-body">
                    <h5>Arsip Dokumen</h5>

                    <form id="formArsip" class="row g-2 mb-3">
                      <div class="col-md-4">
                        <input
                          id="namaFile"
                          class="form-control"
                          placeholder="Nama Dokumen"
                          required
                        />
                      </div>
                      <div class="col-md-4">
                        <input
                          id="fileArsip"
                          type="file"
                          class="form-control"
                          required
                        />
                      </div>
                      <div class="col-md-2">
                        <button class="btn btn-success w-100">Upload</button>
                      </div>
                    </form>

                    <table class="table table-bordered">
                      <thead>
                        <tr>
                          <th>Nama Dokumen</th>
                          <th>File</th>
                          <th>Tanggal</th>
                        </tr>
                      </thead>
                      <tbody id="tabelArsip"></tbody>
                    </table>
                  </div>
                </div>
              </div>

              <!-- ================= POSTER ================= -->
              <div class="tab-pane fade" id="poster">
                <div class="card shadow-sm">
                  <div class="card-body">
                    <input type="file" class="form-control" />
                  </div>
                </div>
              </div>
            </div>

            <a href="kegiatan.html" class="btn btn-secondary mt-4">
              ← Kembali
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- XLSX -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <script>
      /* ===== JUDUL DARI URL ===== */
      const params = new URLSearchParams(window.location.search);
      const namaKegiatan = params.get("nama");
      if (namaKegiatan) {
        document.getElementById("judulKegiatan").innerText =
          "Detail Kegiatan – " + namaKegiatan;
      }

      /* ===== TIM ===== */
      formTim.addEventListener("submit", (e) => {
        e.preventDefault();
        tabelTim.innerHTML += `
        <tr>
          <td>${namaTim.value}</td>
          <td>${jabatanTim.value}</td>
        </tr>`;
        formTim.reset();
      });

      /* ===== ABSENSI ===== */
      const formAbsensi = document.getElementById("formAbsensi");
      const tabelAbsensi = document.getElementById("tabelAbsensi");
      const namaPeserta = document.getElementById("namaPeserta");
      const nimPeserta = document.getElementById("nimPeserta");

      formAbsensi.addEventListener("submit", (e) => {
        e.preventDefault();

        tabelAbsensi.insertAdjacentHTML(
          "beforeend",
          `
    <tr>
      <td>${namaPeserta.value}</td>
      <td>${nimPeserta.value}</td>
      <td>
        <select class="form-select status-select">
          <option value="Hadir">Hadir</option>
          <option value="Izin">Izin</option>
          <option value="Sakit">Sakit</option>
          <option value="Alfa">Alfa</option>
        </select>
      </td>
    </tr>
    `,
        );

        formAbsensi.reset();
      });

      /* ===== DOWNLOAD EXCEL ===== */
      downloadExcel.addEventListener("click", () => {
        // clone tabel biar tampilan asli tidak rusak
        const table = document
          .getElementById("tabelAbsensi")
          .closest("table")
          .cloneNode(true);

        // ubah select jadi text value
        table.querySelectorAll("select").forEach((select) => {
          const td = select.parentElement;
          td.innerText = select.value;
        });

        const wb = XLSX.utils.table_to_book(table, {
          sheet: "Absensi",
        });

        XLSX.writeFile(wb, "absensi_" + (namaKegiatan || "kegiatan") + ".xlsx");
      });
      
      /* ===== QR AUTO FILL ===== */
      qrInput.addEventListener("input", () => {
        if (!qrInput.value.includes("|")) return;
        const [nama, nim] = qrInput.value.split("|");
        namaPeserta.value = nama.trim();
        nimPeserta.value = nim.trim();
      });

      /* ===== ARSIP ===== */
      formArsip.addEventListener("submit", (e) => {
        e.preventDefault();

        const file = fileArsip.files[0];
        if (!file) return;

        tabelArsip.innerHTML += `
    <tr>
      <td>${namaFile.value}</td>
      <td>
        <a href="#" onclick="alert('Download nanti via backend')">
          ${file.name}
        </a>
      </td>
      <td>${new Date().toLocaleDateString()}</td>
    </tr>
  `;

        formArsip.reset();
      });
    </script>
  </body>
</html>
