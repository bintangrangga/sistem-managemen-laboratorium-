<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Register</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS External -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="auth-body">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-icon">👤</div>

        <h4 class="text-center fw-bold">Buat Akun</h4>
        <p class="text-center text-muted mb-4">Daftar untuk mengakses sistem</p>

        <form>
          <!-- NAMA -->
          <div class="mb-3">
            <input
              type="text"
              class="form-control auth-input"
              placeholder="Nama Lengkap"
              required
            />
          </div>

          <!-- EMAIL -->
          <div class="mb-3">
            <input
              type="email"
              class="form-control auth-input"
              placeholder="Email"
              required
            />
          </div>

          <!-- PASSWORD -->
          <div class="mb-3">
            <input
              type="password"
              class="form-control auth-input"
              placeholder="Password"
              required
            />
          </div>

          <!-- NIM -->
          <div class="mb-3">
            <input
              type="text"
              class="form-control auth-input"
              placeholder="NIM"
              required
            />
          </div>

          <!-- PRODI -->
          <div class="mb-3">
            <input
              type="text"
              class="form-control auth-input"
              placeholder="Program Studi"
              required
            />
          </div>

          <!-- TANGGAL LAHIR -->
          <div class="mb-3">
            <input type="date" class="form-control auth-input" required />
          </div>

          <!-- BUTTON -->
          <button type="submit" class="btn auth-btn w-100">DAFTAR</button>
        </form>

        <p class="text-center mt-3 small">
          Sudah punya akun?
          <a href="login.html" class="fw-semibold">Login</a>
        </p>
      </div>
    </div>
  </body>
</html>
