<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Manajemen Kegiatan</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container-fluid">
      <div class="row">
        <!-- SIDEBAR -->
        <div class="col-2 sidebar vh-100 p-3 d-flex flex-column">
          <h5 class="mb-4 fw-bold text-white">ASLAB</h5>

          <nav class="nav flex-column gap-2 flex-grow-1">
            <a class="nav-link" href="dashboard.html">Dashboard</a>
            <a class="nav-link active" href="kegiatan.html"
              >Manajemen Kegiatan</a
            >
            <a class="nav-link" href="#">Laporan Inventaris</a>
          </nav>

          <hr class="text-white opacity-50" />
          <a class="nav-link text-danger fw-semibold" href="login.html"
            >Logout</a
          >
        </div>

        <!-- KONTEN -->
        <div class="col-10 p-0">
          <nav class="navbar bg-white border-bottom px-4">
            <span class="navbar-brand fw-semibold">Manajemen Kegiatan</span>
            <span>Admin</span>
          </nav>

          <div class="p-4">
            <!-- FORM TAMBAH KEGIATAN -->
            <div class="card shadow-sm mb-4">
              <div class="card-body">
                <h5>Tambah Kegiatan</h5>

                <form id="formKegiatan" class="row g-2 mt-2">
                  <div class="col-md-4">
                    <input
                      id="namaKegiatan"
                      class="form-control"
                      placeholder="Nama Kegiatan"
                      required
                    />
                  </div>
                  <div class="col-md-3">
                    <input
                      type="date"
                      id="tanggalKegiatan"
                      class="form-control"
                    />
                  </div>
                  <div class="col-md-3">
                    <input
                      id="tempatKegiatan"
                      class="form-control"
                      placeholder="Tempat"
                    />
                  </div>
                  <div class="col-md-2">
                    <button class="btn btn-success w-100">Tambah</button>
                  </div>
                </form>
              </div>
            </div>

            <!-- DAFTAR KEGIATAN -->
            <div class="card shadow-sm">
              <div class="card-body">
                <h5>Daftar Kegiatan</h5>

                <table class="table table-bordered mt-3">
                  <thead>
                    <tr>
                      <th>Nama Kegiatan</th>
                      <th>Tanggal</th>
                      <th>Tempat</th>
                      <th>Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="tabelKegiatan"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      const form = document.getElementById("formKegiatan");
      const tabel = document.getElementById("tabelKegiatan");

      form.addEventListener("submit", (e) => {
        e.preventDefault();

        const nama = document.getElementById("namaKegiatan").value;
        const tanggal = document.getElementById("tanggalKegiatan").value;
        const tempat = document.getElementById("tempatKegiatan").value;

        tabel.insertAdjacentHTML(
          "beforeend",
          `
          <tr>
            <td>${nama}</td>
            <td>${tanggal}</td>
            <td>${tempat}</td>
            <td>
              <a href="detail.html" class="btn btn-primary btn-sm">
                Detail
              </a>
            </td>
          </tr>
        `,
        );

        form.reset();
      });
    </script>
  </body>
</html>
