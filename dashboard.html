<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- INI PEMBUNGKUS UTAMA -->
    <div class="container-fluid">
      <div class="row">
        <!-- ================= SIDEBAR (KIRI) ================= -->
        <!-- NAH SIDEBAR ITU DI SINI -->
        <div class="col-2 sidebar vh-100 p-3">
          <h5 class="mb-4 fw-bold text-white">ASLAB</h5>

          <nav class="nav flex-column gap-2">
            <a class="nav-link text-white bg-dark rounded px-3 py-2" href="#">
              Dashboard
            </a>

            <a
              class="nav-link text-white rounded px-3 py-2 sidebar-link"
              href="#"
            >
              Manajemen Kegiatan
            </a>

            <a
              class="nav-link text-white rounded px-3 py-2 sidebar-link"
              href="#"
            >
              Laporan Inventaris
            </a>

            <hr class="text-white" />

            <a
              class="nav-link text-white rounded px-3 py-2 sidebar-link"
              href="login.html"
            >
              Logout
            </a>
          </nav>
        </div>
        <!-- ================= AKHIR SIDEBAR ================= -->

        <!-- ================= KONTEN (KANAN) ================= -->
        <div class="col-9 p-0">
          <!-- ===== NAVBAR ATAS ===== -->
          <nav class="navbar navbar-light bg-white border-bottom px-4">
            <span class="navbar-brand mb-0 h5">Dashboard</span>
            <span>Admin</span>
          </nav>
          <!-- ===== AKHIR NAVBAR ===== -->

          <!-- ===== ISI KONTEN ===== -->
          <div class="p-4">
            <!-- Filter Tahun -->
            <div class="d-flex gap-2 mb-4">
              <input type="text" class="form-control w-25" value="2026" />
              <button class="btn btn-success">Filter Tahun</button>
            </div>

            <!-- Grafik -->
            <div class="row">
              <div class="col-md-6 mb-3">
                <div class="card shadow-sm">
                  <div class="card-body">
                    <h6>Grafik Jumlah Kegiatan</h6>
                    <div class="bg-light text-center p-5">Grafik Line</div>
                  </div>
                </div>
              </div>

              <div class="col-md-6 mb-3">
                <div class="card shadow-sm">
                  <div class="card-body">
                    <h6>Grafik Pertumbuhan</h6>
                    <div class="bg-light text-center p-5">Grafik Bar</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <!-- ===== AKHIR KONTEN ===== -->
        </div>
        <!-- ================= AKHIR KONTEN ================= -->
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
